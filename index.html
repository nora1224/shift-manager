<!DOCTYPE html>
<html lang="ja">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:1.5rem}
h2{font-size:18px;font-weight:500}
.week-nav button{background:transparent;border:1px solid #ccc;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px;color:#1a1a1a}
.week-nav button:hover{background:#eee}
.week-nav span{font-size:14px;color:#666;min-width:140px;text-align:center;display:inline-block}
.btn{padding:6px 14px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid #ccc;background:transparent;color:#1a1a1a}
.btn:hover{background:#eee}
.btn.primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn.img-btn{background:#185FA5;color:#fff;border-color:transparent}
.btn.img-btn:hover{background:#0C447C}
.btn.reset-btn{background:transparent;border-color:#E24B4A;color:#E24B4A;font-size:12px;padding:4px 10px}
.btn.reset-btn:hover{background:#FCEBEB}
.save-indicator{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.save-dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block}
.save-dot.saved{background:#639922}

.main-tab{padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px}
.main-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}
.main-tab:hover{color:#1a1a1a}
.month-week{margin-bottom:1.25rem}
.month-week-label{font-size:12px;font-weight:600;color:#666;background:#f0ede8;border-radius:6px;padding:4px 10px;display:inline-block;margin-bottom:8px}
.absence-area{background:#f0ede8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem}
.absence-grid-wrap{overflow-x:auto;margin-top:.75rem}
.absence-grid{display:grid;grid-template-columns:180px repeat(7,minmax(85px,1fr));gap:1px;min-width:820px}
.absence-spacer{background:transparent}
.absence-day{background:#fff;border:0.5px solid #e0e0e0;border-radius:8px;padding:6px}
.absence-day.today{border-color:#378ADD;border-width:1.5px}
.absence-day.weekend{background:#f8f7f4}
.ab-day-label{font-size:10px;color:#888}
.ab-day-date{font-size:13px;font-weight:500;margin-bottom:4px}
.ab-member{display:flex;align-items:center;gap:4px;margin-bottom:2px;cursor:pointer}
.ab-member input{width:12px;height:12px;cursor:pointer;accent-color:#E24B4A}
.ab-name{font-size:11px;line-height:1.3}
.ab-name.off{color:#E24B4A;text-decoration:line-through}
.seto-row{border-top:1px solid #e0e0e0;margin-top:3px;padding-top:3px}
.seto-name{color:#BA7517!important}

.cal-area{margin-top:.5rem}
.period-tabs{display:flex;gap:6px}
.ptab{padding:4px 12px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid #ccc;background:transparent;color:#666}
.ptab.active{background:#1a1a1a;color:#fff;border-color:transparent}
.cal-wrap{overflow-x:auto;margin-top:.75rem}
.cal-grid{display:grid;grid-template-columns:200px repeat(7,minmax(100px,1fr));gap:1px;background:#bbb;border:1px solid #bbb;border-radius:12px;overflow:hidden;min-width:900px}
.cc{background:#fff;padding:6px 5px;min-height:36px}
.cc.head{background:#e8e5e0;font-size:13px;font-weight:700;color:#222;text-align:center;padding:8px 4px}
.cc.head.tcol{color:#185FA5;font-weight:700}
.cc.wknd{background:#f5f2ed}
.cc.tlabel{font-size:13px;color:#222;font-weight:600;padding:7px 10px;display:flex;align-items:center;line-height:1.4}
.cc.tlabel.hl{color:#4A2C00;font-weight:700;background:#FFF8E1}
.chip{display:inline-flex;font-size:13px;font-weight:700;border-radius:4px;padding:3px 8px;margin:2px;cursor:pointer;user-select:none;border:1px solid transparent}
.chip.on{background:#C2DCF5;color:#082E5A}
.chip.off-chip{background:transparent;color:#bbb;text-decoration:line-through;border-color:#e0e0e0}
.chip.abs{background:#FCEBEB;color:#A32D2D;text-decoration:line-through;cursor:default}
.period-section-label{font-size:14px;font-weight:700;color:#333;background:#e0dbd4;border-radius:8px;padding:6px 14px;display:inline-block;margin:1rem 0 .5rem}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:none;align-items:flex-start;justify-content:center;z-index:200;padding-top:60px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:1.25rem;width:380px;max-width:96vw;max-height:80vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,0.12)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.modal-task{margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e0e0e0}
.modal-task:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.modal-task-name{font-size:12px;color:#555;margin-bottom:6px}
.modal-task-name.hl{color:#1a1a1a;font-weight:500}
.modal-chips{display:flex;flex-wrap:wrap;gap:4px}
.mchip{font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;border:1px solid #ccc;background:transparent;color:#1a1a1a}
.mchip:hover{background:#f0f0f0}
.mchip.sel{background:#E6F1FB;color:#185FA5;border-color:transparent}
.mchip.abs-m{background:#FCEBEB;color:#A32D2D;border-color:transparent;cursor:default;text-decoration:line-through}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}

.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.8);display:none;align-items:center;justify-content:center;z-index:300;font-size:15px;color:#666}
.loading-overlay.show{display:flex}
</style>
</head>
<body>

<div class="app">
  <!-- ヘッダー -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px">

        <span style="font-size:12px;color:#888">ログイン：</span>
        <span id="my-name-label" style="font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer" onclick="showNameSelector()">未選択</span>
        <button onclick="showNameSelector()" style="background:transparent;border:none;cursor:pointer;font-size:11px;color:#185FA5;padding:0">変更</button>

let myName = localStorage.getItem('shift_myName') || null;

const BASE_AM=[

  {name:'予約コード発送（楽天・Airbnb）', highlight:true, base:{0:['ガー'],1:['嶋田'],2:['タム'],3:['タム'],4:['ガー'],5:['タム'],6:['太田']}},
  {name:'騒音注意送信（楽天）', base:{0:['ガー'],1:['タム'],2:['タム'],3:['タム'],4:['ガー'],5:['タム'],6:['太田']}},
  {name:'アップグレード送信', base:{0:['ガー'],1:['タム'],2:['タム'],3:['タム'],4:['ガー'],5:['タム'],6:['タム']}},
  {name:'Airbnbメッセージ確認・対応', base:{0:['小島','嶋田'],1:['小島','嶋田'],2:['小島','嶋田'],3:['小島','嶋田'],4:['嶋田','ガー'],5:['ガー'],6:['ガー']}},
  {name:'Booking当日メッセージ確認・対応', base:{0:['小島','嶋田'],1:['小島','嶋田'],2:['小島','嶋田'],3:['小島','嶋田'],4:['嶋田','タム'],5:['ガー','タム'],6:['ガー','タム']}},
  {name:'カスタマメール確認', base:{0:['小島'],1:['嶋田'],2:['小島'],3:['嶋田'],4:['嶋田'],5:['本部担当者'],6:['本部担当者']}},

const BASE_MON=new Date(2026,3,6);
function getMonday(w){const d=new Date(BASE_MON);d.setDate(d.getDate()+w*7);return d;}
function getWeekDays(w){return Array.from({length:7},(_,i)=>{const d=new Date(getMonday(w));d.setDate(d.getDate()+i);return d;});}
function getWeekLabel(w){const days=getWeekDays(w);const s=days[0],e=days[6];return `${s.getMonth()+1}/${s.getDate()}〜${e.getMonth()+1}/${e.getDate()}`;}
function dkey(w,ni){return w*7+ni;}
const NO_WEEKEND=['小島','嶋田'];
function isWknd(ni){return ni===5||ni===6;}
function filterWknd(arr,ni){return isWknd(ni)?arr.filter(m=>!NO_WEEKEND.includes(m)):arr;}
function getBaseStaff(task,ni,period){
  if(task.allMembers){
    if(period==='pm') return MEMBERS.filter(m=>!NO_WEEKEND.includes(m));
    return filterWknd([...MEMBERS],ni);
  }
  return filterWknd(task.base?[...(task.base[ni]||[])]:[], ni);
}

function saveToLS(){
  try{
    const data={
      weekIdx,
      absences:Object.fromEntries(Object.entries(absences).map(([k,v])=>[k,[...v]])),
      overrides:Object.fromEntries(Object.entries(overrides).map(([k,v])=>[k,[...v]]))
    };
    localStorage.setItem(LS_KEY,JSON.stringify(data));
    setSaveIndicator(true);
  }catch(e){setSaveIndicator(false);}
}
function loadFromLS(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw){setSaveIndicator(true,'準備完了');return;}
    const data=JSON.parse(raw);
    // weekIdxは常に今週を使う（保存値は無視）
    absences=Object.fromEntries(Object.entries(data.absences||{}).map(([k,v])=>[k,new Set(v)]));
    overrides=Object.fromEntries(Object.entries(data.overrides||{}).map(([k,v])=>[k,new Set(v)]));
    setSaveIndicator(true,'読み込み完了');
  }catch(e){setSaveIndicator(false,'読み込み失敗');}
}
function setSaveIndicator(ok,msg){
  const dot=document.getElementById('save-dot');
  const txt=document.getElementById('save-text');
  dot.className='save-dot'+(ok?' saved':'');
  txt.textContent=msg||(ok?'自動保存済み':'保存エラー');
}

// ===== GAS同期 =====
function gasRequestJSONP(params){
  return new Promise((resolve)=>{
    if(!GAS_URL||GAS_URL==='YOUR_GAS_URL_HERE'){resolve(null);return;}
    const cbName='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const timeout=setTimeout(()=>{
      delete window[cbName];
      const s=document.getElementById(cbName);
      if(s)s.remove();
      resolve(null);
    },10000);
    window[cbName]=(data)=>{
      clearTimeout(timeout);
      delete window[cbName];
      const s=document.getElementById(cbName);
      if(s)s.remove();
      resolve(data);
    };
    const p={...params,callback:cbName};
    const url=GAS_URL+'?'+new URLSearchParams(p);
    const script=document.createElement('script');
    script.id=cbName;
    script.src=url;
    script.onerror=()=>{clearTimeout(timeout);delete window[cbName];script.remove();resolve(null);};
    document.head.appendChild(script);
  });
}
async function gasRequest(params){
  return gasRequestJSONP(params);
}

async function syncAbsencesFromGAS(){
  if(!GAS_URL||GAS_URL==='YOUR_GAS_URL_HERE'){
    setSaveIndicator(true,'ローカル保存中');
    return;
  }
  setSaveIndicator(true,'同期中...');
  const result=await gasRequest({action:'getAll'});
  if(!result||result.error){setSaveIndicator(false,'同期失敗');return;}
  // 休みをマージ
  Object.entries(result.absences||{}).forEach(([dk,names])=>{
    if(!absences[dk]) absences[dk]=new Set();
    names.forEach(n=>absences[dk].add(n));
  });
  // 担当変更を反映
  Object.entries(result.overrides||{}).forEach(([k,members])=>{
    overrides[k]=new Set(members);
  });
  saveToLS();
  renderAll();
  setSaveIndicator(true,'同期完了');
}

async function pushAbsenceToGAS(daykey, name, absent){
  await gasRequest({action:'setAbsence', daykey, name, absent:String(absent)});
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>syncAbsencesFromGAS(), 1000);
}

async function pushOverrideToGAS(key, members){
  const membersStr=[...members].join(',');
  await gasRequest({action:'setOverride', key, members:membersStr});
}

const TMPL_KEY='shift_mgr_templates';

  const name=document.getElementById('tmpl-name-input').value.trim();

  const tmplOverrides={};
  for(let ni=0;ni<7;ni++){

      tasks.forEach((_,tidx)=>{

    });

  const tmpls=getTemplates();
  const existIdx=tmpls.findIndex(t=>t.name===name);
  if(existIdx>=0){
    if(!confirm(`「${name}」は既に存在します。上書きしますか？`))return;

const DEFAULT_ABSENCES = {
  '瀬戸':    [1],       // 火
  '岩田':    [4, 5],    // 金・土
  'ガー':    [2, 3],    // 水・木
  'タム':    [0, 1],    // 月・火
  '太田':    [2, 3],    // 水・木
};

// 指定週にデフォルト休みを適用（既存データは上書きしない）
function applyDefaultAbsences(w){
  for(let ni=0;ni<7;ni++){
    const daykey=dkey(w,ni);
    Object.entries(DEFAULT_ABSENCES).forEach(([name,days])=>{
      if(days.includes(ni)){
        if(!absences[daykey]) absences[daykey]=new Set();
        absences[daykey].add(name);
      }
    });
  }
}

// 今日が何週目か計算してweekIdxを返す
function calcCurrentWeekIdx(){
  const today=new Date();
  today.setHours(0,0,0,0);
  const base=new Date(BASE_MON);
  base.setHours(0,0,0,0);
  const diff=Math.floor((today-base)/(1000*60*60*24*7));
  return Math.max(0,diff);
}

let weekIdx=calcCurrentWeekIdx();
let absences={};
let overrides={};
let currentPeriod='am';
let pendingDaykey=null,pendingName=null,pendingNi=null,pendingSubs={};

function isAbsent(daykey,name){return(absences[daykey]||new Set()).has(name);}
function getAssigned(daykey,period,tidx,ni){
  const k=`${daykey}_${period}_${tidx}`;
  if(overrides[k])return overrides[k];
  const tasks=period==='am'?BASE_AM:BASE_PM;
  return new Set(getBaseStaff(tasks[tidx],ni,period));
}
function toggleAssign(daykey,period,tidx,name,ni){
  const k=`${daykey}_${period}_${tidx}`;
  if(!overrides[k]){const tasks=period==='am'?BASE_AM:BASE_PM;overrides[k]=new Set(getBaseStaff(tasks[tidx],ni,period));}
  if(overrides[k].has(name))overrides[k].delete(name);else overrides[k].add(name);
  renderAll();saveToLS();
  pushOverrideToGAS(k,overrides[k]);
}
function toggleAbsence(daykey,ni,name){
  // 自分の名前か管理者のみ変更可能
  if(!isAdmin && myName !== name){
    alert(`自分（${myName}）の休みのみ変更できます。`);
    return;
  }
  if(!absences[daykey])absences[daykey]=new Set();
  const wasAbsent=absences[daykey].has(name);
  if(wasAbsent){
    absences[daykey].delete(name);
    saveToLS();
    pushAbsenceToGAS(daykey,name,false);
    renderAll();
    return;
  }
  absences[daykey].add(name);
  const affected=[];
  ['am','pm'].forEach(period=>{
    const tasks=period==='am'?BASE_AM:BASE_PM;
    tasks.forEach((task,tidx)=>{
      if(task.allMembers)return;
      const assigned=getAssigned(daykey,period,tidx,ni);
      if(assigned.has(name))affected.push({period,tidx,task,assigned});
    });
  });
  saveToLS();
  pushAbsenceToGAS(daykey,name,true);
  if(affected.length===0){renderAll();return;}
  if(isAdmin) openSubModal(daykey,ni,name,affected);
  else renderAll();
}
function openSubModal(daykey,ni,name,affected){
  pendingDaykey=daykey;pendingName=name;pendingNi=ni;pendingSubs={};
  affected.forEach(({period,tidx,task,assigned})=>{
    const cur=new Set(assigned);cur.delete(name);
    pendingSubs[`${period}_${tidx}`]={period,tidx,task,current:cur};
  });
  const days=getWeekDays(weekIdx);const d=days[ni];
  document.getElementById('modal-title').textContent=`${name}（${d.getMonth()+1}/${d.getDate()}）の代替者を選択`;
  renderModalBody();
  document.getElementById('modal-bg').className='modal-bg open';
}
function renderModalBody(){
  const daykey=pendingDaykey;

  Object.entries(pendingSubs).forEach(([key,{period,tidx,task,current}])=>{
    const label=period==='am'?'午前':'夕方';
    html+=`<div class="modal-task">

      <div class="modal-chips">`;
    MEMBERS.forEach(m=>{
      if(m===pendingName)return;

      else html+=`<span class="mchip${sel?' sel':''}" onclick="toggleSub('${key}','${m}')">${m}</span>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('modal-body').innerHTML=html;
}
function toggleSub(key,name){

  const cur=pendingSubs[key].current;
  if(cur.has(name))cur.delete(name);else cur.add(name);
  renderModalBody();
}
function applySubstitutes(){

let cellModal={daykey:null,period:null,tidx:null,ni:null,current:null};
function openCellModal(daykey,period,tidx,ni){
  cellModal={daykey,period,tidx,ni};
  cellModal.current=new Set(getAssigned(daykey,period,tidx,ni));
  const tasks=period==='am'?BASE_AM:BASE_PM;
  const task=tasks[tidx];
  const days=getWeekDays(weekIdx);const d=days[ni];
  document.getElementById('modal-title').textContent=`${d.getMonth()+1}/${d.getDate()} ${task.name}`;
  // セルモーダルでは本部担当者も選択可能
  const displayMembers=[...getBaseStaff({allMembers:true},ni,period)];
  if(!displayMembers.includes('本部担当者')) displayMembers.push('本部担当者');
  let html='<div style="font-size:11px;color:#888;margin-bottom:8px">クリックで担当ON/OFFを切り替え</div><div class="modal-chips">';
  displayMembers.forEach(m=>{
    const absent=isAbsent(daykey,m);
    const sel=cellModal.current.has(m);
    if(absent) html+=`<span class="mchip abs-m">${m}（休み）</span>`;
    else html+=`<span class="mchip${sel?' sel':''}" onclick="toggleCellMember('${m}')">${m}</span>`;
  });
  html+='</div>';
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal-bg').className='modal-bg open';
  document.querySelector('#modal-bg .btn.primary').onclick=applyCellModal;
}
function toggleCellMember(name){
  if(!cellModal.current)return;
  if(cellModal.current.has(name))cellModal.current.delete(name);
  else cellModal.current.add(name);
  const displayMembers=[...getBaseStaff({allMembers:true},cellModal.ni,cellModal.period)];
  if(!displayMembers.includes('本部担当者')) displayMembers.push('本部担当者');
  const chips=document.querySelectorAll('#modal-body .mchip:not(.abs-m)');
  let i=0;
  displayMembers.forEach(m=>{
    if(isAbsent(cellModal.daykey,m))return;
    if(chips[i]){chips[i].className='mchip'+(cellModal.current.has(m)?' sel':'');i++;}
  });
}
function applyCellModal(){
  if(!cellModal.daykey)return;
  const k=`${cellModal.daykey}_${cellModal.period}_${cellModal.tidx}`;
  overrides[k]=new Set(cellModal.current);

  // 連動：Booking漏れ確認で担当者が入ったら反対の時間帯を空にする
  const tasks=cellModal.period==='am'?BASE_AM:BASE_PM;
  const task=tasks[cellModal.tidx];
  if(task.linked && cellModal.current.size>0){
    const otherPeriod=task.linked;
    const otherTasks=otherPeriod==='am'?BASE_AM:BASE_PM;
    const otherTidx=otherTasks.findIndex(t=>t.name===task.name);
    if(otherTidx>=0){
      const otherKey=`${cellModal.daykey}_${otherPeriod}_${otherTidx}`;
      overrides[otherKey]=new Set(); // 空にする
    }
  }

  closeModal();
  document.querySelector('#modal-bg .btn.primary').onclick=applySubstitutes;
  renderAll();saveToLS();
  pushOverrideToGAS(k,overrides[k]);
}

// ===== 月単位休み入力 =====
let currentMonth = new Date().getMonth();
let currentYear  = new Date().getFullYear();

function changeMonth(dir){
  currentMonth += dir;
  if(currentMonth > 11){currentMonth=0; currentYear++;}
  if(currentMonth < 0){currentMonth=11; currentYear--;}
  renderMonth();
}

function renderMonth(){
  const today = new Date();
  const label = `${currentYear}年${currentMonth+1}月`;
  document.getElementById('month-label').textContent = label;

  // その月の全日付を取得
  const firstDay = new Date(currentYear, currentMonth, 1);
  const lastDay  = new Date(currentYear, currentMonth+1, 0);

  // 週ごとにグループ化
  const weeks = [];
  let week = [];
  for(let d=new Date(firstDay); d<=lastDay; d.setDate(d.getDate()+1)){
    week.push(new Date(d));
    if(d.getDay()===0 || d.getTime()===lastDay.getTime()){
      weeks.push([...week]);
      week=[];
    }
  }

  let html='';
  weeks.forEach(wDays=>{
    const s=wDays[0], e=wDays[wDays.length-1];
    html+=`<div class="month-week">
      <div class="month-week-label">${s.getMonth()+1}/${s.getDate()}〜${e.getMonth()+1}/${e.getDate()}</div>
      <div class="absence-grid-wrap"><div style="display:grid;grid-template-columns:180px repeat(${wDays.length},minmax(85px,1fr));gap:1px;background:#e0e0e0;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;min-width:400px">`;

    // ヘッダー
    html+=`<div style="background:#f5f5f3;padding:6px 10px;font-size:12px;font-weight:600;color:#666">メンバー</div>`;
    wDays.forEach(d=>{
      const dow=d.getDay();
      const isToday=d.toDateString()===today.toDateString();
      const isWeekend=dow===0||dow===6;
      const dowColor=dow===0?'#A32D2D':dow===6?'#185FA5':'#444';
      html+=`<div style="background:${isWeekend?'#f8f7f4':'#f5f5f3'};padding:6px 4px;font-size:12px;font-weight:700;color:${isToday?'#185FA5':dowColor};text-align:center;${isToday?'border-bottom:2px solid #185FA5':''}">${DAYS_JP[dow]}<br>${d.getMonth()+1}/${d.getDate()}</div>`;
    });

    // 各メンバー行
    const allPeople=[...MEMBERS, SETO];
    allPeople.forEach(m=>{
      const isMine = myName===m;
      const isSeto = m===SETO;
      const rowBg  = isMine ? '#FFFDE7' : '#fff';
      const nameFg = isSeto ? '#BA7517' : (isMine ? '#185FA5' : '#333');
      html+=`<div style="background:${rowBg};padding:6px 10px;font-size:12px;font-weight:${isMine?'700':'500'};color:${nameFg};display:flex;align-items:center;border-top:1px solid #e8e8e8">${m}${isMine?' ✏️':''}</div>`;
      wDays.forEach(d=>{
        // daykeyを計算（BASE_MONからの週offset×7+曜日offset）
        const BASE = new Date(2026,3,6); // 4/6月曜
        const diffDays = Math.round((d - BASE)/(1000*60*60*24));
        const w = Math.floor(diffDays/7);
        const ni= diffDays % 7;
        const daykey = w*7 + (ni < 0 ? ni+7 : ni);
        const off = isAbsent(daykey, m);
        const dow = d.getDay();
        const isWeekend = dow===0||dow===6;
        const canEdit = isAdmin || isMine;
        const cellBg = isWeekend ? '#f8f7f4' : (off ? '#FFEBEB' : '#fff');
        html+=`<div style="background:${cellBg};border-top:1px solid #e8e8e8;padding:4px;text-align:center">`;
        if(canEdit){
          html+=`<input type="checkbox" ${off?'checked':''} onchange="toggleAbsence(${daykey},${ni<0?ni+7:ni},'${m}')"
            style="width:16px;height:16px;cursor:pointer;accent-color:#E24B4A">`;
        } else {
          if(off) html+=`<span style="font-size:11px;color:#E24B4A;font-weight:700">休み</span>`;
          else    html+=`<span style="font-size:11px;color:#ccc">-</span>`;
        }
        html+=`</div>`;
      });
    });
    html+=`</div></div></div>`;
  });

  document.getElementById('month-grid').innerHTML=html;
}

function renderAll(){renderMonth();renderCalendar();}

function changeWeek(dir){
  const n=weekIdx+dir;if(n<0)return;
  // 次週へ進む場合、前週のデータをコピー（既存データは上書きしない）
  if(dir===1){
    const prevW=weekIdx;
    const nextW=n;
    // 担当設定のコピー（overrides）
    for(let ni=0;ni<7;ni++){
      const prevDk=dkey(prevW,ni);
      const nextDk=dkey(nextW,ni);
      ['am','pm'].forEach(period=>{
        const tasks=period==='am'?BASE_AM:BASE_PM;
        tasks.forEach((_,tidx)=>{
          const nextKey=`${nextDk}_${period}_${tidx}`;
          // 次週にまだデータがない場合のみコピー
          if(!overrides[nextKey]){
            const prevKey=`${prevDk}_${period}_${tidx}`;
            if(overrides[prevKey]){
              overrides[nextKey]=new Set(overrides[prevKey]);
            }
          }
        });
      });
      // 休みのコピー（次週にまだ休みデータがない場合のみ）
      if(!absences[nextDk]||absences[nextDk].size===0){
        if(absences[prevDk]&&absences[prevDk].size>0){
          absences[nextDk]=new Set(absences[prevDk]);
        }
      }
    }
  }
  weekIdx=n;
  // 新しい週にデフォルト休みを適用（既存データは上書きしない）
  applyDefaultAbsences(n);
  document.getElementById('week-label').textContent=getWeekLabel(weekIdx);
  saveToLS();renderAll();
}
function switchPeriod(p,el){
  currentPeriod=p;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');renderCalendar();
}

async function exportImage(){
  const overlay=document.getElementById('loading-overlay');
  overlay.className='loading-overlay show';
  try{
    const ea=document.getElementById('export-area');
    const label=getWeekLabel(weekIdx);
    const days=getWeekDays(weekIdx);

    // 休みエリアHTML生成（カレンダーと同じ列幅で揃える）
    function buildExportAbsenceHTML(){
      let html=`<div style="display:grid;grid-template-columns:220px repeat(7,minmax(120px,1fr));gap:1px;background:#999;border:1px solid #999;border-radius:8px;overflow:hidden;margin-bottom:1.75rem;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif">`;
      html+=`<div style="background:#d8d5cf;padding:12px 14px;font-size:16px;font-weight:800;color:#111;display:flex;align-items:center">休み状況</div>`;
      days.forEach((d,ni)=>{
        const daykey=dkey(weekIdx,ni);
        const dow=d.getDay();
        const isWeekend=dow===0||dow===6;
        const bg=isWeekend?'#ede9e2':'#fff';
        const dowColor=dow===0?'#8B0000':dow===6?'#0A3A7A':'#111';
        const allPeople=[...MEMBERS,SETO];
        const absentList=allPeople.filter(m=>isAbsent(daykey,m));
        html+=`<div style="background:${bg};padding:10px 8px">`;
        html+=`<div style="font-size:16px;font-weight:800;color:${dowColor};line-height:1.5">${DAYS_JP[dow]}<br>${d.getMonth()+1}/${d.getDate()}</div>`;
        html+=`<div style="margin-top:8px">`;
        if(absentList.length===0){
          html+=`<div style="font-size:14px;color:#999;font-weight:600">休みなし</div>`;
        } else {
          absentList.forEach(m=>{
            const isSeto=m===SETO;
            html+=`<div style="font-size:15px;font-weight:800;color:${isSeto?'#6B4200':'#8B0000'};margin-bottom:4px;display:flex;align-items:center;gap:5px">
              <span style="font-size:12px;background:${isSeto?'#FFE8A0':'#FFD0D0'};color:${isSeto?'#6B4200':'#8B0000'};border-radius:4px;padding:2px 7px;font-weight:700;white-space:nowrap">休み</span>${m}</div>`;
          });
        }
        html+=`</div></div>`;
      });
      html+=`</div>`;
      return html;
    }

    ea.innerHTML=`
    <div style="font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f3;padding:2.5rem;min-width:1800px">
      <div style="font-size:26px;font-weight:800;color:#111;margin-bottom:1.5rem">シフト管理 ／ ${label}</div>
      <div style="font-size:18px;font-weight:800;color:#333;background:#d8d5cf;border-radius:8px;padding:9px 16px;display:inline-block;margin-bottom:12px">休み状況</div>
      ${buildExportAbsenceHTML()}
      <div style="font-size:18px;font-weight:800;color:#333;background:#d8d5cf;border-radius:8px;padding:9px 16px;display:inline-block;margin-bottom:12px">午前（〜11時）</div>
      <div style="margin-bottom:2rem">${buildExportCalHTML('am',weekIdx)}</div>
      <div style="font-size:18px;font-weight:800;color:#333;background:#d8d5cf;border-radius:8px;padding:9px 16px;display:inline-block;margin-bottom:12px">夕方（16〜18時）</div>
      <div>${buildExportCalHTML('pm',weekIdx)}</div>
    </div>`;
    ea.style.visibility='visible';
    await new Promise(r=>setTimeout(r,300));
    const canvas=await html2canvas(ea,{scale:2,useCORS:true,backgroundColor:'#f5f5f3',logging:false,width:1800});
    ea.style.visibility='hidden';
    const link=document.createElement('a');
    link.download=`シフト_${label.replace(/〜/,'-').replace(/\//g,'')}.png`;
    link.href=canvas.toDataURL('image/png');link.click();
  }catch(e){alert('画像の生成に失敗しました: '+e.message);}
  overlay.className='loading-overlay';
}

loadFromLS();
document.getElementById('week-label').textContent=getWeekLabel(weekIdx);

if(myName){
  document.getElementById('my-name-label').textContent=myName;
  if(myName===ADMIN_NAME) document.getElementById('admin-login-btn').style.display='inline-flex';
} else {
  setTimeout(()=>showNameSelector(), 500);
}

// 月を現在の週に合わせる
const firstDayOfWeek = getWeekDays(weekIdx)[0];
currentYear  = firstDayOfWeek.getFullYear();
currentMonth = firstDayOfWeek.getMonth();

// デフォルト休みを広めに適用（過去4週〜未来8週）
for(let i=-4;i<12;i++) applyDefaultAbsences(weekIdx+i);
saveToLS();

renderMonth();
renderCalendar();

if(GAS_URL && GAS_URL !== 'YOUR_GAS_URL_HERE'){
  // GAS同期後にもデフォルト休みを再適用
  syncAbsencesFromGAS().then(()=>{
    for(let i=-4;i<12;i++) applyDefaultAbsences(weekIdx+i);
    renderAll();
  });
}
